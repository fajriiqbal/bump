<div class="rounded-3xl border border-dashed border-stone-200 bg-white/70 px-6 py-10 text-center">
  <div class="mx-auto max-w-sm">
    <div class="text-lg font-semibold text-brown-dark">{{ title }}</div>
    {% if description %}<p class="mt-2 text-sm text-stone-500">{{ description }}</p>{% endif %}
    {% if action %}
      <div class="mt-6">{{ action|safe }}</div>
    {% endif %}
  </div>
</div>
