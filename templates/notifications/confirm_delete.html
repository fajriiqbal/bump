{% extends "base.html" %}
{% block page_title %}Hapus Data{% endblock %}
{% block content %}
<div class="glass-panel p-6">
  <h2 class="text-2xl font-semibold text-brown-dark">Hapus data WhatsApp</h2>
  <p class="mt-2 text-stone-600">Tindakan ini tidak bisa dibatalkan.</p>
  <form method="post" class="mt-6 flex flex-wrap gap-3">
    {% csrf_token %}
    <button class="btn-danger" type="submit">Hapus</button>
    <a class="btn-secondary" href="{% url 'notifications:index' %}">Batal</a>
  </form>
</div>
{% endblock %}
